# Font
font-family = JetBrains Mono
font-size = 13
font-thicken = true
adjust-cell-height = 2

# Theme — Gruvbox base with vibrant overrides (matches VS Code + JetBrains)
theme = Gruvbox Material Dark
palette = 1=#FF5555
palette = 2=#50FA7B
palette = 3=#FFD54F
palette = 4=#5CB8FF
palette = 5=#D670FF
palette = 6=#56D6FF
palette = 9=#FF7878
palette = 10=#6EFF97
palette = 11=#FFE082
palette = 12=#82CCFF
palette = 13=#E09BFF
palette = 14=#7EE0FF
background-opacity = 0.85
background-blur-radius = 30

# Window
window-padding-x = 16
window-padding-y = 10
window-padding-balance = true
window-padding-color = extend
window-decoration = true
confirm-close-surface = false
gtk-titlebar = true

# Cursor
cursor-style = block
cursor-style-blink = false
cursor-color = #f5e0dc

# Mouse
mouse-hide-while-typing = true

# Clipboard
copy-on-select = clipboard
clipboard-paste-protection = false

# Bold is bright
bold-is-bright = true

# Shell integration
shell-integration = detect

# Shell
command = /usr/bin/zsh

# Neovim/tmux compatibility
window-inherit-working-directory = true
